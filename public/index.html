<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simple Chat</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #join-screen, #chat-screen {
    width: 100%;
    max-width: 480px;
    height: 90vh;
    background: #1e293b;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    padding: 20px;
  }
  #chat-screen { display: none; }
  h2 { margin-top: 0; text-align: center; }
  input {
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #334155;
    color: white;
    font-size: 15px;
    width: 100%;
    margin-bottom: 10px;
  }
  button {
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #6366f1;
    color: white;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
  }
  button:hover { background: #4f46e5; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg { background: #334155; padding: 8px 12px; border-radius: 10px; max-width: 75%; word-wrap: break-word; }
  .msg.me { background: #6366f1; align-self: flex-end; }
  .msg .meta { font-size: 11px; opacity: 0.7; margin-bottom: 2px; }
  .system { text-align: center; font-size: 12px; opacity: 0.6; margin: 4px 0; }
  #input-row { display: flex; gap: 8px; }
  #input-row input { margin-bottom: 0; }
  #input-row button { width: auto; padding: 12px 18px; }
  #status { text-align: center; font-size: 12px; opacity: 0.7; margin-bottom: 8px; }
</style>
</head>
<body>

<div id="join-screen">
  <h2>💬 Simple Chat</h2>
  <p style="text-align:center; opacity:0.7; font-size:14px;">Message gula file e save thake, delete hoy na.</p>
  <input id="username" placeholder="Tomar nam likho..." />
  <button id="joinBtn">Chat e Join Koro</button>
</div>

<div id="chat-screen">
  <div id="status">Online: 0</div>
  <div id="messages"></div>
  <div id="input-row">
    <input id="msgInput" placeholder="Message likho..." autocomplete="off" />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myName = "";

  const joinScreen = document.getElementById("join-screen");
  const chatScreen = document.getElementById("chat-screen");
  const messagesEl = document.getElementById("messages");
  const statusEl = document.getElementById("status");
  const usernameInput = document.getElementById("username");
  const msgInput = document.getElementById("msgInput");

  // ---- Join flow ----
  document.getElementById("joinBtn").addEventListener("click", join);
  usernameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") join();
  });

  function join() {
    myName = usernameInput.value.trim() || "Anonymous";
    socket.emit("join", myName);
    joinScreen.style.display = "none";
    chatScreen.style.display = "flex";
    msgInput.focus();
  }

  // ---- Sending messages ----
  document.getElementById("sendBtn").addEventListener("click", sendMessage);
  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      sendMessage();
    } else {
      socket.emit("typing");
    }
  });

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;
    socket.emit("chat-message", text);
    msgInput.value = "";
  }

  // ---- Receiving old message history (loaded from file on server) ----
  socket.on("message-history", (messages) => {
    messagesEl.innerHTML = "";
    messages.forEach(renderMessage);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });

  // ---- Receiving new live messages ----
  socket.on("chat-message", (data) => {
    renderMessage(data);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });

  socket.on("system", (data) => {
    renderMessage(data);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });

  socket.on("online-count", (count) => {
    statusEl.textContent = `Online: ${count}`;
  });

  function renderMessage(data) {
    const div = document.createElement("div");
    if (data.type === "system") {
      div.className = "system";
      div.textContent = data.text;
    } else {
      div.className = "msg" + (data.user === myName ? " me" : "");
      div.innerHTML = `<div class="meta">${escapeHtml(data.user)} • ${data.time}</div>${escapeHtml(data.text)}`;
    }
    messagesEl.appendChild(div);
  }

  function escapeHtml(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }
</script>

</body>
</html>
